<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="规则怪谈">
<meta name="mobile-web-app-capable" content="yes">

<title>异星规则：生态圈 - 规则怪谈</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-dark: #0a0e1a; --bg-panel: #111827; --text-main: #e2e8f0;
  --text-dim: #64748b; --accent-red: #ef4444; --accent-purple: #a855f7;
  --accent-blue: #3b82f6; --accent-green: #10b981; --accent-amber: #f59e0b;
  --border: #1e293b;
}
body {
  background: var(--bg-dark); color: var(--text-main);
  font-family: 'Courier New', monospace; min-height: 100vh;
  overflow-y: auto; position: relative;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
  background-size: 100% 4px; pointer-events: none; z-index: 1000; opacity: 0.3;
}
@keyframes flicker {
  0% { opacity: 0.97; } 5% { opacity: 0.95; } 10% { opacity: 0.97; }
  15% { opacity: 0.94; } 20% { opacity: 0.97; } 100% { opacity: 0.97; }
}
.container {
  max-width: 900px; margin: 0 auto; padding: 20px;
  min-height: 100vh; display: flex; flex-direction: column;
  animation: flicker 4s infinite;
}
.status-bar {
  display: flex; justify-content: space-between;
  padding: 12px 16px; background: var(--bg-panel);
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 12px; font-size: 14px; letter-spacing: 1px; flex-shrink: 0;
}
.status-item { display: flex; align-items: center; gap: 8px; }
.status-label { color: var(--text-dim); }
.status-value { font-weight: bold; }
.oxygen { color: var(--accent-blue); }
.health { color: var(--accent-green); }
.time { color: var(--accent-amber); }
.temp { color: var(--accent-red); }
.backpack-bar {
  display: flex; gap: 8px; padding: 10px 14px;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 12px; flex-shrink: 0;
  min-height: 48px; align-items: center; overflow-x: auto;
  flex-wrap: wrap;
}
.backpack-label { color: var(--text-dim); font-size: 12px; margin-right: 4px; white-space: nowrap; }
.backpack-empty { color: var(--text-dim); font-size: 12px; font-style: italic; }
.backpack-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.3); border-radius: 6px;
  font-size: 13px; color: var(--accent-blue); white-space: nowrap;
  cursor: pointer; transition: all 0.2s; user-select: none;
}
.backpack-item:hover { background: rgba(59,130,246,0.25); border-color: var(--accent-blue); }
.backpack-item:active { transform: scale(0.95); }
.item-icon { font-size: 16px; }
.main-display {
  flex: 1; background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; overflow-y: auto;
  position: relative; margin-bottom: 12px; min-height: 0;
}
.scene-title {
  font-size: 18px; color: var(--accent-purple); margin-bottom: 12px;
  text-transform: uppercase; letter-spacing: 2px;
  border-bottom: 1px solid var(--border); padding-bottom: 8px;
}
.scene-desc { line-height: 1.8; font-size: 15px; margin-bottom: 16px; }
.scene-desc .highlight-red { color: var(--accent-red); text-shadow: 0 0 8px rgba(239,68,68,0.4); }
.scene-desc .highlight-purple { color: var(--accent-purple); text-shadow: 0 0 8px rgba(168,85,247,0.4); }
.scene-desc .highlight-blue { color: var(--accent-blue); text-shadow: 0 0 8px rgba(59,130,246,0.4); }
.scene-desc .highlight-green { color: var(--accent-green); text-shadow: 0 0 8px rgba(16,185,129,0.4); }
.scene-desc .highlight-amber { color: var(--accent-amber); text-shadow: 0 0 8px rgba(245,158,11,0.4); }
.atmosphere {
  padding: 12px; background: rgba(30,41,59,0.5);
  border-left: 3px solid var(--accent-blue); margin-bottom: 16px;
  font-size: 13px; color: var(--text-dim); font-style: italic; flex-shrink: 0;
}
.choices-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
.choice-btn {
  padding: 14px 18px; background: var(--bg-panel); border: 1px solid var(--border);
  color: var(--text-main); cursor: pointer; text-align: left;
  font-family: inherit; font-size: 14px; border-radius: 6px; transition: all 0.2s;
  white-space: normal; line-height: 1.5;
}
.choice-btn:hover { background: #1e293b; border-color: var(--accent-purple); transform: translateX(4px); }
.log-area {
  margin-bottom: 12px; padding: 12px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  border-radius: 6px; font-size: 13px; display: none; flex-shrink: 0;
}
.log-area.active { display: block; }
.log-title { color: var(--accent-red); font-weight: bold; margin-bottom: 4px; }
.log-area.success { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
.log-area.success .log-title { color: var(--accent-green); }
.toolbar { display: flex; gap: 12px; justify-content: center; flex-shrink: 0; }
.tool-btn {
  padding: 10px 20px; background: var(--bg-panel); border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer; font-family: inherit;
  font-size: 13px; border-radius: 6px; transition: all 0.2s;
}
.tool-btn:hover { color: var(--text-main); border-color: var(--accent-purple); }
.tool-btn.active { background: var(--accent-purple); color: white; border-color: var(--accent-purple); }
.rules-modal {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; background: rgba(0,0,0,0.85);
  z-index: 2000; justify-content: center; align-items: center; padding: 20px;
}
.rules-modal.active { display: flex; }
.rules-paper {
  background: #f5f5dc; color: #1a1a1a; max-width: 500px; width: 100%;
  padding: 32px; border-radius: 2px; position: relative;
  font-family: 'Courier New', monospace; box-shadow: 0 0 30px rgba(0,0,0,0.5);
  transform: rotate(-1deg); max-height: 80vh; overflow-y: auto;
}
.rules-paper::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(transparent, transparent 28px, #e8e4c9 28px, #e8e4c9 29px);
  pointer-events: none; opacity: 0.5;
}
.rules-paper h2 {
  font-size: 20px; margin-bottom: 20px; text-align: center;
  border-bottom: 2px solid #1a1a1a; padding-bottom: 8px;
  position: relative; z-index: 1;
}
.blood-stain {
  position: absolute; width: 40px; height: 40px;
  background: radial-gradient(circle, rgba(139,0,0,0.3) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.rule-item {
  margin-bottom: 16px; padding-left: 8px; line-height: 1.6;
  font-size: 14px; position: relative; z-index: 1;
}
.rule-item.locked { color: #999; font-style: italic; }
.rule-item.unlocked { color: #1a1a1a; }
.rule-number { font-weight: bold; color: #8b0000; }
.rules-close {
  display: block; margin: 20px auto 0; padding: 8px 24px;
  background: #1a1a1a; color: #f5f5dc; border: none; cursor: pointer;
  font-family: inherit; font-size: 14px; position: relative; z-index: 1;
}
.rules-close:hover { background: #333; }
.ending-screen {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; background: var(--bg-dark);
  z-index: 3000; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 40px; text-align: center; overflow-y: auto;
}
.ending-screen.active { display: flex; }
.ending-title { font-size: 32px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; }
.ending-desc { max-width: 600px; line-height: 2; font-size: 16px; margin-bottom: 20px; }
.ending-truth { max-width: 600px; line-height: 1.8; font-size: 14px; margin-bottom: 20px; text-align: left; background: rgba(30,41,59,0.6); padding: 16px; border-radius: 8px; border-left: 3px solid var(--accent-purple); }
.ending-btn {
  padding: 12px 32px; background: transparent; border: 2px solid var(--text-main);
  color: var(--text-main); cursor: pointer; font-family: inherit;
  font-size: 14px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s;
}
.ending-btn:hover { background: var(--text-main); color: var(--bg-dark); }
@keyframes warning { 0%,100% { background: rgba(239,68,68,0.1); } 50% { background: rgba(239,68,68,0.3); } }
.warning-flash { animation: warning 1s infinite; }
.start-btn {
  display: none; padding: 16px 32px; background: var(--accent-purple);
  color: white; border: none; border-radius: 8px;
  font-size: 16px; cursor: pointer; margin: 20px auto; font-family: inherit;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
@media (max-width: 600px) {
  .container { padding: 8px; }
  .status-bar { font-size: 12px; flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
  .status-item { flex: 1 1 30%; min-width: 80px; }
  .status-item:last-child { flex: 1 1 100%; }
  .main-display { padding: 12px; font-size: 14px; }
  .scene-title { font-size: 15px; letter-spacing: 1px; }
  .scene-desc { font-size: 14px; line-height: 1.7; }
  .atmosphere { font-size: 11px; padding: 8px; margin-bottom: 10px; }
  .backpack-bar { padding: 6px 8px; gap: 6px; }
  .backpack-item { font-size: 12px; padding: 4px 8px; }
  .item-icon { font-size: 14px; }
  .choice-btn { padding: 10px 12px; font-size: 13px; }
  .tool-btn { padding: 8px 14px; font-size: 12px; }
  .rules-paper { padding: 20px; transform: rotate(0deg); }
  .rule-item { font-size: 12px; }
  .ending-title { font-size: 22px; }
  .ending-desc { font-size: 13px; }
  .ending-truth { font-size: 12px; padding: 10px; }
}
</style>
<base target="_blank">
</head>
<body>
<div class="container">
  <div class="status-bar">

<div class="rules-modal" id="rulesModal">

    <div id="rulesList"></div>
    <button class="rules-close" onclick="toggleRules()">收起纸条</button>
  </div>
</div>
<div class="ending-screen" id="endingScreen">
  <div class="ending-title" id="endingTitle"></div>
  <div class="ending-desc" id="endingDesc"></div>
  <div class="ending-truth" id="endingTruth"></div>
  <button class="ending-btn" onclick="restartGame()">再次探索</button>
</div>

<script>
console.log('SCRIPT_LOADED');

var GameState = {

var ITEM_ICONS = {

    ending: {
      title: '共生者',
      desc: '你成为了K-774上第一个与生态系统建立共生关系的人类。<br><br>你没有试图征服这颗星球，也没有被它吞噬。你理解了它的规则，尊重了它的边界，找到了共存的可能。<br><br>你的庇护所成为了后来者的灯塔。你的笔记成为了新的生存指南。你证明了人类不仅可以适应环境，还可以与环境达成和解。<br><br>K-774接纳了你。不是作为养分，不是作为入侵者，而是作为生态系统的一个新成员。<br><br>【隐藏结局：共生者】<br><br>解锁条件：收集全部关键物品（数据核心、红色孢子样本、紫色地衣样本、燃料晶体、完整笔记、引擎核心、古老岩画拓片），并在营地休整时选择"建立共生"。',
      truth: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    }
  }
};

function initGame() {
  try {
    GameState.oxygen = 100; GameState.health = 100; GameState.time = 360; GameState.day = 1;
    GameState.temperature = -40; GameState.inventory = []; GameState.flags = {};
    GameState.rulesUnlocked = [false, false, false, false, false, false, false, false, false];
    GameState.currentScene = 'awakening'; GameState.gameOver = false; GameState.discoveredTruth = [];
    var es = document.getElementById('endingScreen'); if (es) es.classList.remove('active');
    var la = document.getElementById('logArea'); if (la) la.classList.remove('active');
    var ca = document.getElementById('choicesArea'); if (ca) ca.innerHTML = '';
    var sb = document.getElementById('startBtn'); if (sb) sb.style.display = 'none';
    var truth = document.getElementById('endingTruth'); if (truth) truth.innerHTML = '';
    updateStatus(); renderScene('awakening'); updateRulesDisplay(); updateBackpack();
  } catch (e) {
    console.error('Init error:', e);
    var desc = document.getElementById('sceneDesc');
    if (desc) desc.innerHTML = '初始化错误：' + e.message + '<br>请尝试点击上方按钮或刷新页面。';
  }
}

// 注册Service Worker（PWA支持）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js')
      .then(function(registration) {
        console.log('ServiceWorker 注册成功: ', registration.scope);
      })
      .catch(function(err) {
        console.log('ServiceWorker 注册失败: ', err);
      });
  });
}

function useItem(itemName) {
  var effect = ITEM_EFFECTS[itemName];
  if (!effect) { addLog(itemName + ' 无法直接使用。'); return; }
  var idx = GameState.inventory.indexOf(itemName);
  if (idx === -1) return;
  // 满状态检查
  if (itemName === '医疗包' && GameState.health >= 100) {
    addLog('生命值已满，无需使用医疗包。'); return;
  }
  if (itemName === '氧气罐' && GameState.oxygen >= 100) {
    addLog('氧气已满，无需更换氧气罐。'); return;
  }
  if (itemName === '应急补给' && GameState.health >= 100 && GameState.oxygen >= 100) {
    addLog('状态良好，无需补给。'); return;
  }
  GameState.inventory.splice(idx, 1);
  GameState.health = Math.min(100, GameState.health + effect.hp);
  GameState.oxygen = Math.min(100, GameState.oxygen + effect.o2);
  var logArea = document.getElementById('logArea');
  var logTitle = document.getElementById('logTitle');
  if (logArea) { logArea.classList.remove('success'); logArea.classList.add('active'); }
  if (logTitle) logTitle.textContent = '物品使用';
  var logContent = document.getElementById('logContent');
  if (logContent) logContent.textContent = effect.msg + (effect.hp > 0 ? ' HP+' + effect.hp : '') + (effect.o2 > 0 ? ' O2+' + effect.o2 : '');
  setTimeout(function() { if (logArea) logArea.classList.remove('active'); }, 4000);
  updateStatus(); updateBackpack();
}

function consumeItem(itemName) {
  var idx = GameState.inventory.indexOf(itemName);
  if (idx !== -1) { GameState.inventory.splice(idx, 1); addLog('消耗了 ' + itemName); updateBackpack(); }
}

var QUEST_ITEMS = ['规则纸条', '数据核心', '红色孢子样本', '紫色地衣样本', '燃料晶体', '完整笔记', '引擎核心', '切割器', '信号发射器', '数据平板', '金属样本罐', '发光虫尸体', '荆棘刺', '望远镜', '备用电池', '古老岩画拓片', '透明冰晶'];
var HEAL_ITEMS = ['医疗包', '氧气罐', '应急补给'];

function updateBackpack() {
  var questBar = document.getElementById('questBackpackBar');
  var questEmpty = document.getElementById('questBackpackEmpty');
  var healBar = document.getElementById('healBackpackBar');
  var healEmpty = document.getElementById('healBackpackEmpty');
  
  // 清空任务背包
  if (questBar) {
    var qItems = questBar.querySelectorAll('.backpack-item');
    for (var i = 0; i < qItems.length; i++) qItems[i].remove();
  }
  // 清空恢复背包
  if (healBar) {
    var hItems = healBar.querySelectorAll('.backpack-item');
    for (var i = 0; i < hItems.length; i++) hItems[i].remove();
  }
  
  var questCount = 0, healCount = 0;
  for (var j = 0; j < GameState.inventory.length; j++) {
    var item = GameState.inventory[j];
    var div = document.createElement('div'); div.className = 'backpack-item';
    var icon = ITEM_ICONS[item] || '◈';
    div.innerHTML = '<span class="item-icon">' + icon + '</span>' + item;
    
    if (HEAL_ITEMS.indexOf(item) !== -1) {
      // 恢复物品
      if (ITEM_EFFECTS[item]) div.onclick = (function(name) { return function() { useItem(name); }; })(item);
      if (healBar) healBar.appendChild(div);
      healCount++;
    } else {
      // 任务物品（不可点击使用）
      if (questBar) questBar.appendChild(div);
      questCount++;
    }
  }
  
  if (questEmpty) questEmpty.style.display = questCount === 0 ? 'inline' : 'none';
  if (healEmpty) healEmpty.style.display = healCount === 0 ? 'inline' : 'none';
}

function advanceTime(minutes) {
  GameState.time += minutes;
  if (GameState.time >= 1440) { GameState.time -= 1440; GameState.day++; GameState.flags.sunsetWarning = false; }
  var hour = Math.floor(GameState.time / 60);
  if (hour >= 18 && !GameState.flags.sunsetWarning) {
    GameState.flags.sunsetWarning = true;
    if (GameState.currentScene !== 'find_camp' && GameState.currentScene !== 'camp_rest' && GameState.currentScene !== 'red_jungle' && GameState.currentScene !== 'night_shelter') {
      addLog('太阳正在落下。天黑之前必须找到庇护所。');
      var md = document.getElementById('mainDisplay');
      if (md) { md.classList.add('warning-flash'); setTimeout(function() { md.classList.remove('warning-flash'); }, 5000); }
    }
  }
  // 夜间有毒气体沉降 - 只有在有紫色地衣样本且处于安全场景时才免疫
  var safeScenes = ['find_camp', 'camp_rest', 'night_shelter', 'underground_tunnel'];
  var isSafe = safeScenes.indexOf(GameState.currentScene) !== -1;
  var hasMoss = GameState.inventory.includes('紫色地衣样本');
  if ((hour >= 20 || hour < 6) && !isSafe) {
    if (hasMoss && GameState.currentScene !== 'red_jungle' && GameState.currentScene !== 'red_jungle_deep') {
      // 有地衣样本但不在安全场景，伤害减半
      GameState.health -= 3; GameState.oxygen -= 3; 
      if (!GameState.flags.nightWarned) { GameState.flags.nightWarned = true; addLog('夜间有毒气体沉降。紫色地衣样本提供了部分保护，但你仍需找到背风处。'); }
    } else {
      // 没有保护，全额伤害
      GameState.health -= 8; GameState.oxygen -= 8; 
      if (!GameState.flags.nightWarned) { GameState.flags.nightWarned = true; addLog('夜间有毒气体沉降！没有紫色地衣的保护，毒素直接侵蚀你的呼吸系统。'); }
    }
  }
  updateStatus();
}

function updateStatus() {
  var o = document.getElementById('oxygen'); if (o) o.textContent = GameState.oxygen + '%';
  var h = document.getElementById('health'); if (h) h.textContent = GameState.health + '%';
  var hour = Math.floor(GameState.time / 60); var minute = GameState.time % 60;
  var t = document.getElementById('time'); if (t) t.textContent = 'DAY ' + GameState.day + ' - ' + (hour < 10 ? '0' : '') + hour + ':' + (minute < 10 ? '0' : '') + minute;
  var temp = -40;
  if (GameState.currentScene === 'red_jungle' || GameState.currentScene === 'red_jungle_deep') temp = -15;
  if (GameState.currentScene === 'crystal_plain' || GameState.currentScene === 'crystal_ruin' || GameState.currentScene === 'crystal_awakening') temp = -55;
  if (GameState.currentScene === 'geothermal_trap' || GameState.currentScene === 'outpost_basement') temp = 20;
  if (GameState.currentScene === 'cave' || GameState.currentScene === 'cave_trap') temp = 5;
  if (GameState.currentScene === 'wind_valley') temp = -60;
  if (GameState.currentScene === 'storm_valley' || GameState.currentScene === 'storm_wait' || GameState.currentScene === 'storm_chase') temp = -50;
  if (GameState.currentScene === 'swamp' || GameState.currentScene === 'swamp_core' || GameState.currentScene === 'swamp_trap') temp = 20;
  if (GameState.currentScene === 'acid_lake' || GameState.currentScene === 'acid_death') temp = -35;
  if (GameState.currentScene === 'fungal_forest' || GameState.currentScene === 'fungal_trap') temp = -20;
  if (GameState.currentScene === 'observation_deck') temp = 15;
  if (GameState.currentScene === 'engine_room') temp = 35;
  if (GameState.currentScene === 'engine_overheat') temp = 70;
  if (GameState.currentScene === 'spore_meadow' || GameState.currentScene === 'spore_infection') temp = -25;
  if (GameState.currentScene === 'underground_tunnel') temp = -10;
  if (GameState.currentScene === 'frozen_waterfall') temp = -65;
  var tp = document.getElementById('temp'); if (tp) tp.textContent = temp + '°C';
  if (GameState.oxygen <= 0 || GameState.health <= 0) {
    if (!GameState.gameOver) { GameState.gameOver = true; setTimeout(function() { showEnding('death'); }, 500); }
  }
}

function renderScene(sceneId) {
  var scene = SCENES[sceneId];
  if (!scene) { console.error('Scene not found:', sceneId); return; }
  GameState.currentScene = sceneId;
  var titleEl = document.getElementById('sceneTitle'); if (titleEl) titleEl.textContent = scene.title;
  var atmosEl = document.getElementById('atmosphere'); if (atmosEl) atmosEl.textContent = scene.atmosphere;
  var descEl = document.getElementById('sceneDesc'); if (descEl) descEl.innerHTML = highlightText(scene.desc);
  var choicesEl = document.getElementById('choicesArea');
  if (choicesEl) {
    choicesEl.innerHTML = '';
    if (scene.ending) { setTimeout(function() { showEnding(sceneId); }, 1000); return; }
    for (var j = 0; j < scene.choices.length; j++) {
      (function(choice) {
        if (choice.condition && !choice.condition()) return;
        var btn = document.createElement('button'); btn.className = 'choice-btn';
        btn.appendChild(document.createTextNode(choice.text));
        btn.onclick = function() { if (choice.effect) choice.effect(); if (choice.next) renderScene(choice.next); };
        choicesEl.appendChild(btn);
      })(scene.choices[j]);
    }
  }
  updateStatus(); updateBackpack();
}

function highlightText(text) {
  return text
    .replace(/红色/g, '<span class="highlight-red">红色</span>')
    .replace(/蓝色/g, '<span class="highlight-blue">蓝色</span>')
    .replace(/紫色/g, '<span class="highlight-purple">紫色</span>')
    .replace(/绿色/g, '<span class="highlight-green">绿色</span>')
    .replace(/发光/g, '<span class="highlight-amber">发光</span>')
    .replace(/温暖/g, '<span class="highlight-red">温暖</span>')
    .replace(/寒冷/g, '<span class="highlight-blue">寒冷</span>')
    .replace(/同伴/g, '<span class="highlight-purple">同伴</span>')
    .replace(/风/g, '<span class="highlight-green">风</span>');
}

function addLog(text) {
  var logArea = document.getElementById('logArea');
  var logContent = document.getElementById('logContent');
  var logTitle = document.getElementById('logTitle');
  if (logArea) { logArea.classList.remove('success'); logArea.classList.add('active'); }
  if (logTitle) logTitle.textContent = '警告';
  if (logContent) logContent.textContent = text;
  setTimeout(function() { if (logArea) logArea.classList.remove('active'); }, 5000);
}

function unlockRule(index) {
  if (!GameState.rulesUnlocked[index]) {
    GameState.rulesUnlocked[index] = true; updateRulesDisplay();
    var btn = document.getElementById('btnRules');
    if (btn) { btn.classList.add('active'); setTimeout(function() { btn.classList.remove('active'); }, 1000); }
    addLog('新规则解锁：规则 ' + (index + 1));
  }
}

function updateRulesDisplay() {
  var list = document.getElementById('rulesList'); if (!list) return;
  list.innerHTML = '';
  for (var i = 0; i < RULES.length; i++) {
    var div = document.createElement('div');
    div.className = 'rule-item ' + (GameState.rulesUnlocked[i] ? 'unlocked' : 'locked');
    if (GameState.rulesUnlocked[i]) {
      div.innerHTML = '<span class="rule-number">规则 ' + (i + 1) + '：</span>' + RULES[i].text;
    } else {
      div.innerHTML = '<span class="rule-number">规则 ' + (i + 1) + '：</span>████████████（油污覆盖，无法辨认）';
    }
    list.appendChild(div);
  }
}

function toggleRules() {
  var modal = document.getElementById('rulesModal'); if (modal) modal.classList.toggle('active');
}

function showEnding(sceneId) {
  var scene = SCENES[sceneId];
  var titleEl = document.getElementById('endingTitle');
  var descEl = document.getElementById('endingDesc');
  var truthEl = document.getElementById('endingTruth');
  var screen = document.getElementById('endingScreen');
  if (!scene || !scene.ending) {
    if (titleEl) { titleEl.textContent = '任务失败'; titleEl.style.color = 'var(--accent-red)'; }
    if (descEl) descEl.textContent = '你的氧气耗尽，或伤势过重。K-774接纳了你，就像它接纳了所有前任一样。你的宇航服将成为新的生态位，你的故事将成为下一个宇航员捡到的纸条。';
    if (truthEl) truthEl.innerHTML = '';
  } else {
    if (titleEl) { titleEl.textContent = scene.ending.title; titleEl.style.color = sceneId === 'ending_merge' ? 'var(--accent-purple)' : sceneId === 'ending_escape' ? 'var(--accent-blue)' : sceneId === 'hidden_path' ? 'var(--accent-green)' : 'var(--accent-red)'; }
    if (descEl) descEl.innerHTML = highlightText(scene.ending.desc);
    if (truthEl && scene.ending.truth) {
      var truthHtml = '<div style="color:var(--accent-purple);font-weight:bold;margin-bottom:8px;">【本次探索揭示的真相】</div>';
      for (var i = 0; i < scene.ending.truth.length; i++) truthHtml += '<div style="margin-bottom:8px;">' + TRUTHS[scene.ending.truth[i]] + '</div>';
      truthEl.innerHTML = truthHtml;
    }
  }
  if (screen) screen.classList.add('active');
}

function restartGame() { initGame(); }
initGame();
</script>
</body>
</html>
